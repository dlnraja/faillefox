    url: https://github.com/dlnraja/faillefox/security/advisories/new
    about: Pour les failles qui ne doivent pas être publiques avant correctif — NE PAS ouvrir une issue publique.
  - name: 💬 Question / discussion générale
    url: https://github.com/dlnraja/faillefox/discussions
    about: Pour les questions d'usage, idées, ou discussions avant de formaliser une issue.
  - name: 📖 Documentation
    url: https://github.com/dlnraja/faillefox#-documentation
    about: README, guide Android, guide antivirus, guide ClamAV, ROADMAP.
