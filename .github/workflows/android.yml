# Build de l'APK Android (debug auto-signé + release si keystore configuré).
#
# Le keystore de release est optionnel : si le secret ANDROID_KEYSTORE_BASE64
# n'est pas configuré, on publie un APK debug-signé (installable mais non
# publiable sur Play Store). Avec le keystore, l'APK est signé pour release.
#
# Pour configurer la signature release (une fois) :
#   1. keytool -genkey -v -keystore faillefox.jks -keyalg RSA -keysize 2048 \
#        -validity 10000 -alias faillefox
#   2. base64 faillefox.jks > keystore.b64
#   3. Ajouter les secrets GitHub :
#        ANDROID_KEYSTORE_BASE64 = contenu de keystore.b64
#        ANDROID_KEY_ALIAS       = faillefox
#        ANDROID_KEY_PASSWORD    = (votre mot de passe clé)
#        ANDROID_STORE_PASSWORD  = (votre mot de passe keystore)
name: Android APK

on:
  push:
    tags: ["v*"]
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        required: true
        type: string

permissions:
  contents: write

jobs:
  apk:
    name: Build & sign APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3
        with:
          # Packages sur une seule ligne (le YAML multiligne cassait sdkmanager).
          packages: "platforms;android-34 build-tools;34.0.0 ndk;26.3.11579264"

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build Go AAR (bindings moteur)
        env:
          # gomobile utilise l'API level 16 par défaut, NON supportée par les
          # NDK récents (minimum 21). On force le minimum supporté.
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264
        run: |
          mkdir -p android/app/libs
          set -x
          gomobile bind -v -target=android/amd64,android/arm64 -androidapi 21 \
            -o android/app/libs/faillefox.aar ./pkg/android 2>&1 || {
            echo "==> gomobile bind échoué, logs ci-dessus"
            exit 1
          }
          ls -la android/app/libs/faillefox.aar

      - name: Configure keystore (release) si secret présent
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PWD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PWD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "Pas de keystore release -> APK debug-signé"
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > android/faillefox.jks
          cat > android/keystore.properties <<EOF
          storeFile=faillefox.jks
          storePassword=$STORE_PWD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PWD
          EOF

      - name: Build APK
        working-directory: android
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          # On utilise gradle directement (installé via setup-gradle), pas
          # ./gradlew (le wrapper binaire n'est pas dans le dépôt).
          if [ -f faillefox.jks ]; then
            echo "==> Build release (keystore configuré)"
            gradle assembleRelease --no-daemon
            cp app/build/outputs/apk/release/app-release-unsigned.apk \
               ../faillefox-${TAG}.apk || \
            cp app/build/outputs/apk/release/app-release.apk ../faillefox-${TAG}.apk
          else
            echo "==> Build debug (pas de keystore release — APK installable mais non Play Store)"
            gradle assembleDebug --no-daemon
            cp app/build/outputs/apk/debug/app-debug.apk ../faillefox-${TAG}.apk
          fi
          ls -la ../faillefox-${TAG}.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: faillefox-*.apk
