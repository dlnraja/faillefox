# Lint : analyse statique avec golangci-lint.
# Tourne sur les PR pour attraper tôt les problèmes de qualité de code.
name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # golangci-lint v2.x est requis : il est compilé avec une version
          # de Go >= 1.24 et peut donc analyser du code ciblant Go 1.26.
          # Les versions v1.x (compilées avec Go <= 1.24) refusent de tourner.
          # NB : golangci-lint v2 nécessite golangci-lint-action v7+.
          version: v2.0.2
          args: --timeout=5m
