# Lint : analyse statique avec golangci-lint.
# Tourne sur les PR pour attraper tôt les problèmes de qualité de code.
name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # golangci-lint ne peut analyser que du code ciblant une version
          # de Go <= celle avec laquelle il a été compilé.
          # Go 1.26 exige donc une version récente de golangci-lint (v2.12+,
          # compilée avec Go 1.26). Les versions v1.x et v2.x anciennes
          # (compilées avec Go <= 1.25) refusent de tourner sur notre module.
          version: v2.12.1
          args: --timeout=5m
