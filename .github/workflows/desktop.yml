# Build des binaires GUI desktop (Fyne) — nécessite CGO + OpenGL.
# Produit faillefox-gui pour Windows, Linux, macOS (un job par OS car CGO
# ne cross-compile pas facilement).
#
# Le GUI est un binaire SÉPARÉ du démon faillefox (qui reste pur Go). Il
# parle à l'API loopback du démon.
name: Desktop GUI

on:
  push:
    tags: ["v*"]
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            ext: .exe
            artifact: faillefox-gui-windows-amd64.exe
          - os: ubuntu-latest
            ext: ""
            artifact: faillefox-gui-linux-amd64
          - os: macos-latest
            ext: ""
            artifact: faillefox-gui-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      # Linux : installe les dépendances OpenGL/X11 requises par Fyne.
      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      # Windows : MinGW/gcc est préinstallé sur windows-latest.
      # macOS : Xcode + clang sont préinstallés sur macos-latest.

      - name: Install Fyne dependency
        run: go get fyne.io/fyne/v2@latest

      - name: Build GUI binary
        env:
          CGO_ENABLED: "1"
        run: |
          go build -tags desktop -o faillefox-gui${{ matrix.ext }} ./cmd/faillefox-gui

      - name: Package
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            zip -q "faillefox-gui-${TAG}-$(echo ${{ runner.os }} | tr '[:upper:]' '[:lower:]').zip" faillefox-gui${{ matrix.ext }}
          else
            tar -czf "faillefox-gui-${TAG}-$(echo ${{ runner.os }} | tr '[:upper:]' '[:lower:]').tar.gz" faillefox-gui${{ matrix.ext }}
          fi
          ls -la faillefox-gui-*

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: faillefox-gui-*
