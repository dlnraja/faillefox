# Auto-merge des PRs Dependabot : met à jour automatiquement les
# dépendances Go et les GitHub Actions sans intervention manuelle.
#
# Fonctionnement :
#   1. Dependabot ouvre une PR (ex: bump actions/checkout v4 → v7)
#   2. Le CI tourne sur la PR (build + vet + test + lint)
#   3. Si le CI est VERT, ce workflow merge automatiquement la PR (squash)
#   4. Si le CI est ROUGE, la PR reste ouverte (intervention manuelle requise)
#
# Condition : ne merge QUE les PRs dont l'auteur est dependabot.
name: Auto-merge Dependabot

on:
  pull_request:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge if CI passes
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Attendre que le CI de la PR termine
        uses: lewagon/wait-on-check-action@v1.8.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: ""
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30

      - name: Vérifier que le CI est vert
        id: checks
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
            });
            const allDone = checks.data.check_runs.every(c => c.status === 'completed');
            const allGreen = checks.data.check_runs.every(c => c.conclusion === 'success');
            if (!allDone) {
              core.setFailed('Les checks ne sont pas tous terminés');
            } else if (!allGreen) {
              core.setFailed('Au moins un check a échoué — pas d\'auto-merge');
            } else {
              core.setOutput('can_merge', 'true');
            }

      - name: Merge la PR (squash)
        if: steps.checks.outputs.can_merge == 'true'
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash --delete-branch \
            --subject "deps: ${{ github.event.pull_request.title }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
