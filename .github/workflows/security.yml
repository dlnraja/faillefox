# Security : analyse statique de sécurité avec gosec sur chaque PR/push.
# gosec inspecte le code Go à la recherche de patterns dangereux (injections,
# faiblesse crypto, fichiers world-readable, command injection via exec...).
name: Security (gosec)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  gosec:
    name: gosec scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Run gosec
        # Non bloquant : gosec produit un rapport mais ne fait pas échouer
        # le job (-no-fail). Les issues sont à corriger au fil de l'eau.
        uses: securego/gosec@master
        with:
          args: |
            -no-fail
            -exclude=G104,G304,G306,G307,G401,G505
            -severity medium
            -confidence medium
            -fmt sonarqube
            -out gosec-report.json
            ./...

      - name: Upload gosec report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gosec-report
          path: gosec-report.json
          retention-days: 30
