# Release : cross-compile multi-OS + archives + sommes de contrôle,
# puis crée une GitHub Release sur chaque tag v*.*.*
#
# Déclenchement : pousser un tag de version.
#   git tag v0.2.0 && git push origin v0.2.0
#
# Produit des binaires pour Windows, Linux, macOS (amd64 + arm64), ZIP/tar.gz
# et un fichier SHA256SUMS vérifiable. L'UI web est embarquée via go:embed :
# chaque binaire est autonome, sans fichier externe.
#
# Pour Windows, on génère aussi une ressource VERSIONINFO (.syso) via
# goversioninfo, qui embarque les métadonnées (Company, Product, Version,
# manifeste UAC) dans le .exe — cela réduit les faux positifs AV.
name: Release

on:
  push:
    tags:
      # Matche les tags manuels (v0.4.0) ET les auto-releases hebdo
      # (v0.2026.25.1 — 4 composantes).
      - "v*"
  # Permet au workflow weekly-release et auto-version de l'invoquer directement
  # (évite la limitation GitHub : un push de tag fait par github-actions[bot] ne
  # déclenche PAS d'autres workflows).
  workflow_call:
    inputs:
      tag:
        description: "Tag de version à créer"
        required: true
        type: string
  # Permet aussi un déclenchement manuel depuis l'onglet Actions (ex: pour
  # rattraper une release manquée par la limite anti-boucle).
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag existant à builder/publier (ex: v0.6.0)"
        required: true
        type: string

permissions:
  contents: write # nécessaire pour créer la release et uploader les assets

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      # Si appelé via workflow_call, on checkout le tag fourni ; sinon on
      # utilise le comportement par défaut (le tag qui a déclenché le push).
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install goversioninfo (pour VERSIONINFO Windows)
        # Le binaire est dans le sous-dossier cmd/ (le package racine n'est
        # pas un main package).
        run: go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest

      - name: Generate Windows VERSIONINFO resource (.syso)
        # goversioninfo lit le fichier version_info.json (racine du dépôt)
        # qui contient toutes les métadonnées (Company, Product, Version,
        # manifeste UAC, etc.) et produit resource.syso dans cmd/faillefox/.
        # go build lie automatiquement ce .syso au binaire Windows (convention
        # Go : tout .syso dans le package main est lié).
        run: |
          cd cmd/faillefox
          $HOME/go/bin/goversioninfo ../../version_info.json
          ls -la resource.syso

      - name: Cross-compile all targets
        # CGO_ENABLED=0 pour des binaires statiques portables.
        # -trimpath -ldflags="-s -w" pour des binaires plus petits.
        run: |
          mkdir -p dist
          build_one () {
            local os="$1" arch="$2" ext=""
            if [ "$os" = "windows" ]; then ext=".exe"; fi
            echo "==> $os/$arch"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w" \
              -o "dist/faillefox-${os}-${arch}${ext}" \
              ./cmd/faillefox
          }
          build_one windows amd64
          build_one windows arm64
          build_one linux   amd64
          build_one linux   arm64
          build_one darwin  amd64
          build_one darwin  arm64

      - name: Sign Windows binaries (self-signed cert)
        # Best-effort : un certificat auto-signé ne fait PAS disparaître les
        # alertes AV (l'AV dira "éditeur inconnu"), mais c'est mieux que pas
        # de signature du tout. Pour une signature reconnue, utiliser SignPath
        # (voir docs/antivirus.md) ou un certificat payant.
        run: |
          # Génère un certificat self-signed de code-signing.
          openssl req -x509 -newkey rsa:2048 -keyout key.pem -out cert.pem \
            -days 3650 -nodes -subj "/CN=Faillefox/O=dlnraja" \
            -addext "extendedKeyUsage=codeSigning" 2>/dev/null
          # Convertit en PFX (format Windows).
          openssl pkcs12 -export -in cert.pem -inkey key.pem \
            -out faillefox.pfx -passout pass:faillefox 2>/dev/null
          # Signe les .exe Windows avec osslsigncode (dispo sur ubuntu-latest).
          if command -v osslsigncode >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq libxml2 > /dev/null 2>&1 || true
            for f in dist/faillefox-windows-*.exe; do
              echo "Signature de $f..."
              osslsigncode sign -pkcs12 faillefox.pfx -pass faillefox \
                -t http://timestamp.digicert.com \
                -in "$f" -out "${f}.signed" 2>/dev/null && mv "${f}.signed" "$f" || \
                echo "  (osslsigncode indisponible, binaire non signé)"
            done
          else
            echo "osslsigncode non disponible — binaires non signés (best-effort)"
          fi
          # Nettoyage des fichiers de clé.
          rm -f key.pem cert.pem faillefox.pfx

      - name: Package archives + checksums
        # ZIP pour Windows (avec LICENSE/README/guide AV), tar.gz pour Unix,
        # puis sommes SHA256.
        run: |
          cd dist
          cp ../docs/antivirus.md ./ANTIVIRUS.txt 2>/dev/null || true
          for f in faillefox-*; do
            case "$f" in
              *.exe) zip -q "${f}.zip" "$f" ../LICENSE ../README.md ./ANTIVIRUS.txt ;;
              *)     tar -czf "${f}.tar.gz" "$f" ;;
            esac
          done
          sha256sum faillefox-*.zip faillefox-*.tar.gz > SHA256SUMS
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # tag_name explicite : utilise inputs.tag si appelé via workflow_call,
          # sinon le tag qui a déclenché le workflow (github.ref_name).
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true # notes auto depuis les PRs/commits
          files: |
            dist/faillefox-*.zip
            dist/faillefox-*.tar.gz
            dist/SHA256SUMS

  # Job 2 : paquets installables (.deb Linux + installateur .exe Windows).
  # Tourne en parallèle du job release (qui produit les binaires nus).
  packages:
    name: Build installable packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build .deb (Linux amd64)
        run: |
          chmod +x deploy/linux/build-deb.sh
          ./deploy/linux/build-deb.sh "${{ inputs.tag || github.ref_name }}"
          mv dist/*.deb dist/faillefox-latest.deb || true

      - name: Upload .deb to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/*.deb

      # L'installateur Windows Inno Setup nécessite Windows + iscc.
      # On le build sur windows-latest.
  windows-installer:
    name: Build Windows installer (.exe Inno Setup)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install Inno Setup
        # Inno Setup 6 est préinstallé sur les runners windows-latest GitHub.
        # On vérifie juste sa présence.
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
          }
          (Get-Command iscc -ErrorAction SilentlyContinue).Path
          if (Test-Path $iscc) { Write-Host "ISCC OK: $iscc" }

      - name: Build Windows installer
        shell: pwsh
        # Le script build-installer.ps1 gère le build binaire + VERSIONINFO
        # + appel iscc. Il attend une version sans le 'v' initial.
        run: |
          $tag = "${{ inputs.tag || github.ref_name }}"
          $ver = $tag.TrimStart("v")
          Write-Host "==> Version: $ver"
          # Build binaire Windows à la racine (le .iss le cherche là).
          $env:GOOS="windows"; $env:GOARCH="amd64"; $env:CGO_ENABLED="0"
          go build -trimpath -ldflags="-s -w" -o faillefox.exe ./cmd/faillefox
          if (-not (Test-Path faillefox.exe)) { throw "go build failed" }
          # Inno Setup : iscc est dans Program Files (x86)\Inno Setup 6.
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "Inno Setup 6 non trouvé" }
          & $iscc "/DMyAppVersion=$ver" "deploy/windows/faillefox.iss"
          Get-ChildItem deploy/windows/Output/ -ErrorAction SilentlyContinue

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: deploy/windows/Output/faillefox-setup-*.exe
