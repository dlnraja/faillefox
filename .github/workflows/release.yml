# Release : cross-compile multi-OS + archives + sommes de contrôle,
# puis crée une GitHub Release sur chaque tag v*.*.*
#
# Déclenchement : pousser un tag de version.
#   git tag v0.2.0 && git push origin v0.2.0
#
# Produit des binaires pour Windows, Linux, macOS (amd64 + arm64), ZIP/tar.gz
# et un fichier SHA256SUMS vérifiable. L'UI web est embarquée via go:embed :
# chaque binaire est autonome, sans fichier externe.
#
# Pour Windows, on génère aussi une ressource VERSIONINFO (.syso) via
# goversioninfo, qui embarque les métadonnées (Company, Product, Version,
# manifeste UAC) dans le .exe — cela réduit les faux positifs AV.
name: Release

on:
  push:
    tags:
      # Matche les tags manuels (v0.4.0) ET les auto-releases hebdo
      # (v0.2026.25.1 — 4 composantes).
      - "v*"
  # Permet au workflow weekly-release de l'invoquer directement (évite la
  # limitation GitHub : un push de tag fait par github-actions[bot] ne
  # déclenche PAS d'autres workflows).
  workflow_call:
    inputs:
      tag:
        description: "Tag de version à créer"
        required: true
        type: string

permissions:
  contents: write # nécessaire pour créer la release et uploader les assets

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      # Si appelé via workflow_call, on checkout le tag fourni ; sinon on
      # utilise le comportement par défaut (le tag qui a déclenché le push).
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install goversioninfo (pour VERSIONINFO Windows)
        # Le binaire est dans le sous-dossier cmd/ (le package racine n'est
        # pas un main package).
        run: go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest

      - name: Generate Windows VERSIONINFO resource (.syso)
        # goversioninfo lit le fichier version_info.json (racine du dépôt)
        # qui contient toutes les métadonnées (Company, Product, Version,
        # manifeste UAC, etc.) et produit resource.syso dans cmd/faillefox/.
        # go build lie automatiquement ce .syso au binaire Windows (convention
        # Go : tout .syso dans le package main est lié).
        run: |
          cd cmd/faillefox
          $HOME/go/bin/goversioninfo ../../version_info.json
          ls -la resource.syso

      - name: Cross-compile all targets
        # CGO_ENABLED=0 pour des binaires statiques portables.
        # -trimpath -ldflags="-s -w" pour des binaires plus petits.
        run: |
          mkdir -p dist
          build_one () {
            local os="$1" arch="$2" ext=""
            if [ "$os" = "windows" ]; then ext=".exe"; fi
            echo "==> $os/$arch"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w" \
              -o "dist/faillefox-${os}-${arch}${ext}" \
              ./cmd/faillefox
          }
          build_one windows amd64
          build_one windows arm64
          build_one linux   amd64
          build_one linux   arm64
          build_one darwin  amd64
          build_one darwin  arm64

      - name: Package archives + checksums
        # ZIP pour Windows (avec LICENSE/README/guide AV), tar.gz pour Unix,
        # puis sommes SHA256.
        run: |
          cd dist
          cp ../docs/antivirus.md ./ANTIVIRUS.txt 2>/dev/null || true
          for f in faillefox-*; do
            case "$f" in
              *.exe) zip -q "${f}.zip" "$f" ../LICENSE ../README.md ./ANTIVIRUS.txt ;;
              *)     tar -czf "${f}.tar.gz" "$f" ;;
            esac
          done
          sha256sum faillefox-*.zip faillefox-*.tar.gz > SHA256SUMS
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # tag_name explicite : utilise inputs.tag si appelé via workflow_call,
          # sinon le tag qui a déclenché le workflow (github.ref_name).
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true # notes auto depuis les PRs/commits
          files: |
            dist/faillefox-*.zip
            dist/faillefox-*.tar.gz
            dist/SHA256SUMS
