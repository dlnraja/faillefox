# Soumission automatique des binaires de release aux labs antivirus via
# leurs API publiques gratuites (pas de navigateur, pas de captcha).
#
# Labs supportés (tous gratuits) :
#   - VirusTotal (https://www.virustotal.com)
#   - Hybrid Analysis (https://www.hybrid-analysis.com)
#   - MetaDefender Cloud (https://metadefender.opswat.com)
#
# Configuration (secrets GitHub optionnels) :
#   VIRUSTOTAL_API_KEY      -> https://www.virustotal.com (Profile > API Key)
#   HYBRID_ANALYSIS_API_KEY -> https://www.hybrid-analysis.com (Profile > API Key)
#   METADEFENDER_API_KEY    -> https://metadefender.opswat.com (Sign up > API)
#
# Sans ces secrets, le workflow saute proprement (pas d'erreur).
name: AV reputation

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag de release à soumettre"
        required: true

permissions:
  contents: read

jobs:
  submit:
    name: Submit to AV labs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Récupère le .exe Windows de la release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.release_tag || github.event.release.tag_name }}"
          mkdir -p submit
          gh release download "$TAG" --pattern "faillefox-windows-amd64.exe.zip" --dir submit || true
          cd submit && unzip -o faillefox-windows-amd64.exe.zip 2>/dev/null || true
          ls -la

      - name: Build l'outil avsubmit
        run: go build -o avsubmit ./cmd/avsubmit

      - name: Soumission aux labs AV
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          HYBRID_ANALYSIS_API_KEY: ${{ secrets.HYBRID_ANALYSIS_API_KEY }}
          METADEFENDER_API_KEY: ${{ secrets.METADEFENDER_API_KEY }}
        run: |
          EXE=$(find submit -name "faillefox-windows-amd64.exe" -o -name "faillefox*.exe" | head -1)
          if [ -z "$EXE" ]; then
            echo "Aucun .exe Windows trouvé dans la release."
            exit 0
          fi
          echo "Soumission de $EXE aux labs AV..."
          ./avsubmit -file "$EXE" -pretty=false

      - name: Lien Microsoft Defender (manuel, pas d'API publique)
        run: |
          echo "==> Microsoft Defender n'a PAS d'API publique d'upload."
          echo "    Soumission manuelle (une fois) :"
          echo "    https://www.microsoft.com/en-us/wdsi/filesubmission"
          echo "    Ou lancez localement : deploy/windows/submit-to-av.ps1"
