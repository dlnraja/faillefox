name: Weekly auto-release

# Auto-release hebdomadaire : cree un tag date chaque lundi, PUIS invoque
# directement le workflow release.yml (via workflow_call) pour builder et
# publier la release. On n'utilise pas le push de tag pour declencher
# release.yml car GitHub bloque les workflows declenches par un push fait
# par github-actions[bot] (anti-boucle).
#
# Permet aussi un declenchement manuel depuis l'onglet Actions.
on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  autotag:
    name: Create weekly tag and release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
      skipped: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if no new commits since last tag
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git rev-list --count "${LAST_TAG}..HEAD")
            if [ "$COMMITS" = "0" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Generate weekly version tag
        if: steps.check.outputs.skip != 'true'
        id: ver
        run: |
          YEAR=$(date -u +%Y)
          WEEK=$(date -u +%V)
          SEQ=1
          TAG="v0.${YEAR}.${WEEK}.${SEQ}"
          while git rev-parse "$TAG" >/dev/null 2>&1; do
            SEQ=$((SEQ + 1))
            TAG="v0.${YEAR}.${WEEK}.${SEQ}"
          done
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Push tag
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.ver.outputs.tag }}" -m "Auto-release hebdomadaire ${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

  # Etape 2 : invoque release.yml directement (pas via push de tag).
  release:
    name: Build & publish
    needs: autotag
    if: needs.autotag.outputs.skipped != 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.autotag.outputs.tag }}
    permissions:
      contents: write
